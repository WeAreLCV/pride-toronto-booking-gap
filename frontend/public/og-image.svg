<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6B3BFF"/>
      <stop offset="0.55" stop-color="#4A15ED"/>
      <stop offset="1" stop-color="#2D00B8"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E5AFFB"/>
      <stop offset="1" stop-color="#C980E6"/>
    </linearGradient>
    <radialGradient id="glow1" cx="15%" cy="20%" r="55%">
      <stop offset="0" stop-color="#4A15ED" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#4A15ED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="95%" cy="95%" r="55%">
      <stop offset="0" stop-color="#E5AFFB" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#E5AFFB" stop-opacity="0"/>
    </radialGradient>
    <style>
      .mono { font-family: 'JetBrains Mono', 'SFMono-Regular', ui-monospace, monospace; }
      .serif { font-family: 'Fraunces', 'Times New Roman', Georgia, serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#292929"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Top meta -->
  <text x="60" y="70" class="mono" font-size="14" letter-spacing="4" fill="#E4E2DD" opacity="0.72">
    INDEPENDENT COMMUNITY AUDIT · WE ARE LCV
  </text>
  <text x="1140" y="70" class="mono" font-size="14" letter-spacing="4" fill="#E4E2DD" opacity="0.72" text-anchor="end">
    PRIDE TORONTO 2025
  </text>

  <!-- Hairline -->
  <line x1="60" y1="90" x2="1140" y2="90" stroke="#E4E2DD" stroke-opacity="0.16"/>

  <!-- Title -->
  <text x="60" y="225" class="serif" font-size="130" font-weight="500" fill="#E4E2DD" letter-spacing="-5">
    The Booking
  </text>
  <text x="60" y="345" class="serif" font-size="130" font-weight="400" font-style="italic" fill="url(#g2)" letter-spacing="-5">
    Gap<tspan fill="#4A15ED" font-weight="700" font-style="normal">.</tspan>
  </text>

  <!-- Hero number -->
  <g>
    <text x="60" y="540" class="serif" font-style="italic" font-weight="700" font-size="200" fill="url(#g1)" letter-spacing="-10">60.4<tspan font-size="110" dy="-70">%</tspan></text>
    <!-- Outline echo -->
    <text x="66" y="546" class="serif" font-style="italic" font-weight="700" font-size="200" fill="none" stroke="#E5AFFB" stroke-width="1" letter-spacing="-10" opacity="0.55">60.4<tspan font-size="110" dy="-70">%</tspan></text>
  </g>

  <!-- Label block -->
  <text x="660" y="420" class="serif" font-size="74" font-weight="700" fill="#E4E2DD" letter-spacing="-2">were</text>
  <text x="660" y="500" class="serif" font-size="92" font-weight="700" fill="#E4E2DD" letter-spacing="-3">
    Gay Men<tspan fill="#E5AFFB">.</tspan>
  </text>
  <text x="660" y="545" class="mono" font-size="16" fill="#E4E2DD" opacity="0.72" letter-spacing="2">
    Of 409 performers · Pride Toronto 2025
  </text>

  <!-- Bottom bar -->
  <line x1="60" y1="580" x2="1140" y2="580" stroke="#E4E2DD" stroke-opacity="0.16"/>
  <text x="60" y="610" class="mono" font-size="14" fill="#E5AFFB" font-weight="700" letter-spacing="3">@WEARELCV</text>
  <text x="1140" y="610" class="mono" font-size="14" fill="#E4E2DD" opacity="0.52" letter-spacing="3" text-anchor="end">
    WEARELCV.CA
  </text>
</svg>
